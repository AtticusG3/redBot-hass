name: Red Discord Bot
version: "1.1.0"
slug: red_discordbot
description: >-
  Red-DiscordBot (Red) for Discord, using the phasecorex/red-discordbot Docker image.
  Host network is enabled so RPC tools on your Home Assistant machine can reach Red.
  Share and add-on config folders are mounted for custom cog paths. Configure token and prefix below.
url: https://github.com/AtticusG3/redBot-hass
arch:
  - aarch64
  - amd64
startup: application
boot: auto
audio: true
init: true
host_network: true
map:
  - type: share
    read_only: false
  - type: addon_config
    read_only: false
    path: /addon_config
options:
  prefix: "."
  timezone: UTC
  puid: 1000
  pgid: 1000
schema:
  token: "password?"
  prefix: str
  prefix2: "str?"
  prefix3: "str?"
  prefix4: "str?"
  prefix5: "str?"
  timezone: str
  puid: int
  pgid: int
  owner: "str?"
  extra_args: "str?"
  redbot_version: "str?"
  niceness: "int?"
