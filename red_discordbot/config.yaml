name: Red Discord Bot
version: "1.0.0"
slug: red_discordbot
description: >-
  Red-DiscordBot (Red) for Discord, using the phasecorex/red-discordbot Docker image.
  Configure token and prefix in the options below. Data persists in the add-on data folder.
url: https://github.com/AtticusG3/redBot-hass
arch:
  - aarch64
  - amd64
startup: application
boot: auto
audio: true
init: true
options:
  prefix: "."
  timezone: UTC
  puid: 1000
  pgid: 1000
schema:
  token: "password?"
  prefix: str
  prefix2: "str?"
  prefix3: "str?"
  prefix4: "str?"
  prefix5: "str?"
  timezone: str
  puid: int
  pgid: int
  owner: "str?"
  extra_args: "str?"
  redbot_version: "str?"
  niceness: "int?"
