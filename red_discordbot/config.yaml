name: Red Discord Bot
version: "1.2.1"
slug: red_discordbot
description: >-
  Red-DiscordBot (Red) for Discord, using the phasecorex/red-discordbot Docker image.
  Host network for RPC; optional RPC bridge for HA Core. Share and add-on config mounted for cogs.
url: https://github.com/AtticusG3/redBot-hass
arch:
  - aarch64
  - amd64
startup: application
boot: auto
audio: true
init: true
host_network: true
map:
  - type: share
    read_only: false
  - type: addon_config
    read_only: false
    path: /addon_config
options:
  prefix: "."
  timezone: UTC
  puid: 1000
  pgid: 1000
  rpc_bridge_enabled: false
  rpc_bridge_port: 6134
  rpc_target_port: 6133
  extra_args: "--rpc"
schema:
  token: "password?"
  prefix: str
  prefix2: "str?"
  prefix3: "str?"
  prefix4: "str?"
  prefix5: "str?"
  timezone: str
  puid: int
  pgid: int
  owner: "str?"
  extra_args: "str?"
  redbot_version: "str?"
  niceness: "int?"
  rpc_bridge_enabled: bool
  rpc_bridge_port: port
  rpc_target_port: port
