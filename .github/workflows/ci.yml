name: Add-on CI

on:
  push:
  pull_request:

jobs:
  lint-and-validate:
    name: Lint and validate add-on files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shellcheck entrypoint
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "./red_discordbot"
          severity: warning

      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: red_discordbot/Dockerfile

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate config.yaml schema basics
        run: |
          python - <<'PY'
          import yaml

          with open("red_discordbot/config.yaml", "r", encoding="utf-8") as f:
              cfg = yaml.safe_load(f)

          required_top = {"name", "version", "slug", "options", "schema"}
          missing = sorted(required_top - set(cfg.keys()))
          if missing:
              raise SystemExit(f"config.yaml missing keys: {', '.join(missing)}")

          options = cfg.get("options", {})
          schema = cfg.get("schema", {})
          missing_option_schema = sorted(k for k in options.keys() if k not in schema)
          if missing_option_schema:
              raise SystemExit(
                  "config.yaml schema missing option keys: " + ", ".join(missing_option_schema)
              )

          print("config.yaml validation passed")
          PY

  build-smoke:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build add-on image
        run: |
          docker build \
            --build-arg PCX_TAG=latest \
            -f red_discordbot/Dockerfile \
            red_discordbot
